name: Build, Publish, and Deploy Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Gives you the manual "Run workflow" button!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push the Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Make sure this matches what is inside your VPS docker-compose.yml
          tags: ${{ secrets.DOCKER_USERNAME }}/sharppay-frontend:latest

      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # We trigger the exact same deployment script to pull the new frontend image!
            chmod +x /root/sharppay/deploy_sharppay.sh
            /root/sharppay/deploy_sharppay.sh